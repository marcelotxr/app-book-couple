<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosso Amor ❤️</title>  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      color: #fff;
      overflow-x: hidden;
    } 

    .container {
      background: rgba(0,0,0,0.35);
      padding: 25px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    } 

    h1 { font-size: 1.8em; }
    p { font-size: 1.1em; } 

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #ff4b5c;
      color: white;
      margin-top: 10px;
    } 

    .hidden { display: none; } 

    .gallery img {
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    } 

    /* Corações */
    .heart {
      position: fixed;
      bottom: -20px;
      font-size: 20px;
      animation: subir 5s linear infinite;
    } 

    @keyframes subir {
      from { transform: translateY(0); opacity:1; }
      to { transform: translateY(-100vh); opacity:0; }
    } 

    /* Digitação */
    .digitando {
      border-right: 2px solid white;
      white-space: nowrap;
      overflow: hidden;
    }
  </style></head>
<body><!-- TELA DE SENHA --><div class="container" id="telaSenha">
  <h2>Digite nossa data ❤️</h2>
  <input id="senhaInput" placeholder="Ex: 01012023">
  <button onclick="verificarSenha()">Entrar</button>
</div><!-- CONTEÚDO PRINCIPAL --><div class="container hidden" id="conteudo">  <h1>Feliz Aniversário de Namoro ❤️</h1>  <!-- TEXTO ANIMADO -->  <p id="texto" class="digitando"></p>  <!-- CONTADOR -->  <div id="contador"></div>  <!-- GALERIA -->  <div class="gallery">
    <img src="https://via.placeholder.com/400x300">
    <img src="https://via.placeholder.com/400x300">
  </div>  <!-- BOTÃO PRESENTE --><button onclick="mostrarPresente()">Abrir presente 🎁</button> 

  <!-- PRESENTE -->  <div id="presente" class="hidden">
    <p>Você é o melhor presente da minha vida ❤️</p>
  </div>  <!-- MÚSICA --><audio id="musica" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio> 

</div><script> 

// SENHA
const senhaCorreta = "10012026"; 

function verificarSenha() {
  const valor = document.getElementById('senhaInput').value; 

  if(valor === senhaCorreta) {
    document.getElementById('telaSenha').classList.add('hidden');
    document.getElementById('conteudo').classList.remove('hidden');
    iniciarTudo();
  } else {
    alert("Senha incorreta 💔");
  }
} 

// INICIAR TUDO
function iniciarTudo() {
  tocarMusica();
  iniciarContador();
  iniciarCoracoes();
  digitarTexto();
} 

// MÚSICA
function tocarMusica() {
  document.getElementById('musica').play();
} 

// DATA (ALTERAR)
const dataInicio = new Date('2026-01-10'); 

function iniciarContador() {
  setInterval(() => {
    const agora = new Date();
    const dias = Math.floor((agora - dataInicio)/(1000*60*60*24));
    document.getElementById('contador').innerText = `Estamos juntos há ${dias} dias ❤️`;
  },1000);
} 

// CORAÇÕES
function iniciarCoracoes() {
  setInterval(() => {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerText = '❤️';
    heart.style.left = Math.random()*100 + 'vw';
    document.body.appendChild(heart);
    setTimeout(()=> heart.remove(),5000);
  },500);
} 

// TEXTO DIGITANDO
function digitarTexto() {
  const texto = "Desde que você entrou na minha vida, tudo ficou mais bonito. Eu te amo ❤️";
  let i = 0;
  const el = document.getElementById('texto'); 

  const intervalo = setInterval(()=>{
    el.textContent += texto[i];
    i++;
    if(i>=texto.length) clearInterval(intervalo);
  },50);
} 

// PRESENTE
function mostrarPresente() {
  document.getElementById('presente').classList.remove('hidden');
} 

</script></body>
</html>
