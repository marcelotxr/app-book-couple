<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosso Amor ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(120deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;


      min-height: 100vh; /* Permite crescer se o conteúdo for maior */
      padding: 20px; /* Espaço nas bordas do celular */

      text-align: center;
      color: #fff;
    }

    /*CAIXA PRINCIPAL*/
    
    .container {
      background: rgba(0,0,0,0.3);
      padding: 25px;
      border-radius: 20px;
      width: 100%; /* Ocupa toda largura no mobile */
      max-width: 400px; /* Limite em telas maiores */
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    /*TEXTOS*/
    h1 {
      font-size: 1.8em; /* Levemente menor para celular */
      line-height: 1.3;
    }

    p {
      font-size: 1.1em;
      margin: 12px 0;
    }

    /*BOTÃO*/
    button {
      width: 100%; /* Botão ocupa toda largura no celular */
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #ff4b5c;
      color: white;
      font-size: 1em;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      background: #ff1e3c;
    }

    /*ELEMENTO ESCONDIDO*/
    .hidden {
      display: none;
      margin-top: 20px;
      animation: fadeIn 1s ease-in-out;
    }

    /*ANIMAÇÃO*/
    @keyframes fadeIn {
      from { 
        opacity: 0;
        transform: translateY(20px);
      } 
      to { 
        opacity: 1;
        transform: translateY(0);
      } 
    }

    /*AJUSTES PARA TELAS MAIORES*/
    @media (min-width: 768px) {
      h1 {
        font-size: 2.2em; /* Maior em desktop */
      }

      p {
        font-size: 1.2em;
      }

      button {
        width: auto; /* Volta ao tamanho normal */
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>

  <!-- CONTEÚDO PRINCIPAL -->
  <div class="container">

    <!-- Título da página -->
    <h1>Feliz Aniversário de Namoro ❤️</h1>

    <!-- Pequena introdução -->
    <p>Hoje celebramos o nosso amor...</p>

    <!-- Botão que dispara uma ação em JavaScript -->
    <button onclick="mostrarMensagem()">Clique aqui 💌</button>

    <!-- Essa parte começa escondida (classe 'hidden')
      Ela só aparece quando o botão é clicado -->
    
    <div id="mensagem" class="hidden">
      <p>Desde que você entrou na minha vida, tudo ficou mais bonito.</p>
      <p>Eu te amo mais a cada dia! 💖</p>
      <p>Que venham muitos outros momentos juntos!</p>
    </div>
  </div>

  <script>
    /*FUNÇÃO JAVASCRIPT*/

    function mostrarMensagem() {
      const elemento = document.getElementById('mensagem');
      elemento.classList.remove('hidden');
    }
  </script>

</body>
</html>
